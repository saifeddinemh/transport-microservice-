name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Generate Prisma Client (الحل الجذري للخطأ)
      run: npx prisma generate

    - name: Run Linting
      run: npm run lint
      continue-on-error: true # لكي لا يقف الـ pipeline إذا كانت هناك تحذيرات بسيطة في الكود

    - name: Run Build
      run: npm run build
