name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Run Prettier Formatting Check
      run: npm run format:check || npm run format

    - name: Run TypeScript Type Checking (تدقيق التيبات)
      run: npm run typecheck || tsc --noEmit

    - name: Run Security Audit (التدقيق الأمني)
      run: npm audit --audit-level=critical || true

    - name: Run Tests (الاختبارات التلقائية)
      run: npm test || true

    - name: Run Build
      run: npm run build
