name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20.x"

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------
  # 1) QUALITÉ : install, typecheck, lint, format, prisma generate, tests, build
  # ---------------------------------------------------------------------
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies (frozen lockfile)
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  # ---------------------------------------------------------------------
  # 2) SÉCURITÉ : audit des dépendances, secrets, variables d'environnement
  # ---------------------------------------------------------------------
  security:
    name: Security checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for secret scanning)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies (frozen lockfile)
        run: npm ci

      - name: npm audit (high/critical)
        run: npm run audit
        continue-on-error: true

      - name: Validate .env.example / required variables
        run: npm run check:env

      - name: Scan for leaked secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------
  # 3) Statut agrégé pratique à référencer comme "required check" unique
  # ---------------------------------------------------------------------
  ci-success:
    name: CI success
    if: always()
    needs: [quality, security]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any dependent job failed
        run: |
          if [ "${{ needs.quality.result }}" != "success" ] || [ "${{ needs.security.result }}" != "success" ]; then
            echo "One or more required jobs failed."
            exit 1
          fi
          echo "All checks passed."
